services:
  mushroommapapp.api:
    image: mushroommapapp.api
    build:
      context: src/MushroomMapApp
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "5005:5005"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - api-storage:/app/Storage/Files
    depends_on:
      mushroommapapp.db:
        condition: service_healthy
      mushroommapapp.redis:
        condition: service_started

  mushroommapapp.db:
    image: docker.io/postgis/postgis:latest
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - sql-data:/var/lib/postgresql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mushroommapapp.redis:
    image: docker.io/library/redis:latest
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  sql-data:
  redis-data:
  api-storage:

